name: flutter_game_clock
description: A multi-clock application to board games
version: 1.0.0+1

environment:
  sdk: ">=2.1.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  shelf: ^0.7.5
  equatable: ^1.0.0
  data_connection_checker: ^0.3.4
  dartz: ^0.8.8
  shared_preferences: ^0.5.4+6
  rxdart: ^0.22.6
  get_it: ^3.1.0
  google_fonts: ^0.3.7

dev_dependencies:
  flutter_launcher_icons: "^0.7.4"
  flutter_test:
    sdk: flutter
flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/background.png
